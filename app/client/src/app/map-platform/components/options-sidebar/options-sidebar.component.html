<h4 class="sidebar-title">{{ "menu.options" | translate }}</h4>

<div class="options-container" style="padding: 0 4px;">
  <div style="margin-bottom: 2rem;">
    <h5 style="font-size: 14px; font-weight: 600; color: #7f8c8d; margin-bottom: 1rem; padding-left: 4px;">{{ 'options.basemaps' | translate }}</h5>
    <div *ngIf="bmaps.length != 0; else loading">
      <div *ngFor="let bmap of bmaps" class="options-card">
        <span>{{ bmap.label }}</span>
        <p-inputSwitch
          (onChange)="onChangeBmap(bmap, $event)"
          [(ngModel)]="bmap.checked"
        ></p-inputSwitch>
      </div>
    </div>
  </div>
</div>

<ng-template #loading>
  <app-loading-spinner />
</ng-template>
