<h4 class="sidebar-title">{{ "right_sidebar.title" | translate }}</h4>

<div class="statistics-container" style="padding: 0 4px;">
  <div *ngIf="summaryData.get('coverage_natural'); else loadingSpinner">
    
    <p-accordion [multiple]="true" [activeIndex]="[0, 1, 2, 3]" styleClass="modern-accordion">
      
      <!-- Section: Geral -->
      <p-accordionTab [header]="'right_sidebar.resumo_card.coverage_natural_title' | translate">
        <div class="chart-section">
          <div class="chart-container" style="height: 250px; padding: 10px;">
            <p-chart type="doughnut" [data]="coverageNaturalChartData" [options]="doughnutOptions" height="230px">
            </p-chart>
          </div>
        </div>
      </p-accordionTab>

      <!-- Section: Cobertura por Região (Tabs) -->
      <p-accordionTab [header]="'right_sidebar.resumo_card.coverage_comparison_title' | translate" *ngIf="coverageComparisonAppChartData || coverageComparisonRlChartData || coverageComparisonMfaChartData">
        <p-tabView>
          <p-tabPanel header="APP" *ngIf="coverageComparisonAppChartData">
            <div class="chart-section">
              <div class="chart-container" style="height: 600px; padding: 10px;">
                <p-chart type="bar" [data]="coverageComparisonAppChartData" [options]="stackedBarOptions" height="580px">
                </p-chart>
              </div>
            </div>
          </p-tabPanel>
          <p-tabPanel [header]="'right_sidebar.resumo_card.chart_labels.rl' | translate" *ngIf="coverageComparisonRlChartData">
            <div class="chart-section">
              <div class="chart-container" style="height: 600px; padding: 10px;">
                <p-chart type="bar" [data]="coverageComparisonRlChartData" [options]="stackedBarOptions" height="580px">
                </p-chart>
              </div>
            </div>
          </p-tabPanel>
          <p-tabPanel [header]="'right_sidebar.resumo_card.chart_labels.mfa' | translate" *ngIf="coverageComparisonMfaChartData">
            <div class="chart-section">
              <div class="chart-container" style="height: 600px; padding: 10px;">
                <p-chart type="bar" [data]="coverageComparisonMfaChartData" [options]="stackedBarOptions" height="580px">
                </p-chart>
              </div>
            </div>
          </p-tabPanel>
        </p-tabView>
      </p-accordionTab>

    </p-accordion>

  </div>
</div>

<ng-template #loadingSpinner>
  <div class="loader-container">
    <app-loading-spinner></app-loading-spinner>
  </div>
</ng-template>
