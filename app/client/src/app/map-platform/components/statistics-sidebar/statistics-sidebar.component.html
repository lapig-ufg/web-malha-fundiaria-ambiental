<h4 class="sidebar-title">{{ "right_sidebar.title" | translate }}</h4>

<div class="statistics-container" style="padding: 0 4px;">
  <div *ngIf="summaryData.get('coverage_natural') && summaryData.get('coverage_comparison'); else loadingSpinner">
    
    <!-- Coverage Comparison Chart (Stacked Bar) -->
    <div class="chart-section" style="margin-bottom: 2rem;" *ngIf="coverageComparisonChartData">
      <h5 class="section-title">{{ 'right_sidebar.resumo_card.coverage_comparison_title' | translate }}</h5>
      <div class="chart-container" style="height: 650px; padding: 10px;">
        <p-chart type="bar" [data]="coverageComparisonChartData" [options]="stackedBarOptions" height="630px">
        </p-chart>
      </div>
    </div>

    <!-- Coverage Natural Chart -->
    <div class="chart-section" style="margin-top: 2rem;" *ngIf="coverageNaturalChartData">
      <h5 class="section-title">{{ 'right_sidebar.resumo_card.coverage_natural_title' | translate }}</h5>
      <div class="chart-container" style="height: 250px; padding: 10px;">
        <p-chart type="doughnut" [data]="coverageNaturalChartData" [options]="doughnutOptions" height="230px">
        </p-chart>
      </div>
    </div>

  </div>
</div>

<ng-template #loadingSpinner>
  <div class="loader-container">
    <app-loading-spinner></app-loading-spinner>
  </div>
</ng-template>
